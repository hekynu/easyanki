<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        :root {
            --bg: #f8f9fa;
            --wrapper-bg: #ffffff;
            --text: #1a1a1a;
            --border: #eeeeee;
            --hr: #f0f0f0;
            --header-bg: #ffffff;
        }

        body.dark-mode {
            --bg: #000000;
            --wrapper-bg: #000000;
            --text: #ffffff;
            --border: #333333;
            --hr: #333333;
            --header-bg: #1a1a1a;
        }

        body, html { height: 100%; margin: 0; overflow: hidden; background-color: var(--bg) !important; transition: background 0.2s; }
        
        .study-wrapper { 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            max-width: 600px; 
            margin: 0 auto; 
            background: var(--wrapper-bg); 
        }

        .study-header { 
            padding: 10px 15px; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--header-bg); 
            z-index: 10; 
        }

        .card-body-content { 
            flex: 1; 
            overflow-y: auto; 
            padding: 50px 25px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
        }

        .front-section { width: 100%; min-height: 100px; display: flex; align-items: center; justify-content: center; }
        .front-text { font-size: 2.5rem; font-weight: 800; color: var(--text); margin: 0; line-height: 1.2; }
        
        .back-section { width: 100%; display: flex; flex-direction: column; align-items: center; }
        .back-text { font-size: 2rem; color: #198754; font-weight: 600; line-height: 1.3; }
        
        /* Dark mode adjustment for back text to keep it readable */
        body.dark-mode .back-text { color: #4ade80; }

        .card-photo { 
            max-height: 350px; width: auto; object-fit: contain; margin-top: 25px; 
            border-radius: 12px; box-shadow: 0 6px 18px rgba(0,0,0,0.2); 
        }

        .card-footer-buttons { padding: 10px 5px 40px 5px; background: var(--wrapper-bg); border-top: 1px solid var(--border); }
        .btn-xl { padding: 35px 2px; font-size: 1.1rem; font-weight: 900; text-transform: uppercase; border-radius: 12px; border: none; }
        .btn-show-answer { padding: 45px 0; font-size: 1.5rem; letter-spacing: 1px; }
        
        hr { width: 70%; margin: 2.5rem auto; border-top: 3px solid var(--hr); opacity: 1; }
        .xlarge { font-size: 2.5rem !important; }
        
        .badge { background-color: var(--header-bg) !important; color: var(--text) !important; border: 1px solid var(--border) !important; }
    </style>
</head>
<body>
    <div class="study-wrapper">
        <div class="study-header">
            <a href="/exit" class="btn btn-sm btn-outline-secondary">Exit</a>
            <div>
                <span class="badge">Lv. {{ card.level }}</span>
                <span class="badge">{{ (card.strength * 100)|int }}%</span>
                <button onclick="toggleDarkMode()" class="btn btn-sm btn-link p-0 ms-2 text-decoration-none" id="themeBtn">🌙</button>
            </div>
            <span class="text-muted small">#{{ card.id }}</span>
        </div>

        <div class="card-body-content">
            <div class="front-section">
                <div id="front" class="front-text text-center">
                    {{ card.front | safe }}
                </div>
            </div>

            <div id="back" class="back-section text-center" style="display:none;">
                <hr>
                <div class="back-text">
                    {{ card.back | safe }}
                </div>
            </div>
        </div>

        <div class="card-footer-buttons">
            <div id="action-show">
                <button onclick="reveal()" class="btn btn-dark btn-xl btn-show-answer w-100 shadow">Show Answer</button>
            </div>
            <div id="action-review" style="display:none;">
                <form action="/review/{{ card.id }}" method="POST">
                    <div class="d-flex gap-1 justify-content-between">
                        <button name="choice" value="forgot" class="btn btn-danger btn-xl flex-grow-1">Forgot</button>
                        <button name="choice" value="ng" class="btn btn-warning btn-xl flex-grow-1">NG</button>
                        <button name="choice" value="good" class="btn btn-success btn-xl flex-grow-1">Good</button>
                        <button name="choice" value="best" class="btn btn-primary btn-xl flex-grow-1">Best</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function reveal() {
            document.getElementById('back').style.display = 'flex';
            document.getElementById('action-show').style.display = 'none';
            document.getElementById('action-review').style.display = 'block';
            const content = document.querySelector('.card-body-content');
            setTimeout(() => { content.scrollTo({ top: content.scrollHeight, behavior: 'smooth' }); }, 50);
        }

        function toggleDarkMode() {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateBtn(isDark);
        }

        function updateBtn(isDark) {
            document.getElementById('themeBtn').innerHTML = isDark ? '☀️' : '🌙';
        }

        (function() {
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                updateBtn(true);
            }
        })();
    </script>
</body>
</html>
