<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        :root { 
            --bg: #f8f9fa; 
            --card-bg: #ffffff; 
            --text: #212529; 
            --border: #dee2e6; 
            --input-bg: #ffffff;
        }
        body.dark-mode { 
            --bg: #000000; 
            --card-bg: #1c1c1e; 
            --text: #ffffff; 
            --border: #3a3a3c; 
            --input-bg: #000000;
        }

        body { 
            background-color: var(--bg) !important; 
            color: var(--text) !important; 
            transition: background-color 0.2s; 
            padding: 20px; 
        }
        .search-container { max-width: 800px; margin: auto; }
        
        /* High Contrast Search Bar */
        input.form-control {
            background-color: var(--input-bg) !important;
            color: var(--text) !important;
            border: 2px solid var(--border) !important;
            padding: 15px;
            border-radius: 12px;
            font-size: 1.1rem;
        }
        input:focus {
            border-color: #0d6efd !important;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25) !important;
            outline: none;
        }

        .card-row { 
            background-color: var(--card-bg); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            padding: 18px; 
            margin-bottom: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .card-row:hover { filter: brightness(1.2); color: inherit; transform: translateY(-2px); transition: 0.2s; }
        
        .card-content { max-width: 80%; }
        .card-preview-text { color: var(--text); opacity: 0.8; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="search-container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <a href="/" class="btn btn-outline-secondary">← Dashboard</a>
            <h4 class="m-0 fw-bold">Library Search</h4>
            <button onclick="toggleDarkMode()" class="btn btn-sm btn-outline-secondary" id="themeBtn">🌙</button>
        </div>

        <form method="GET" action="/search" class="mb-4">
            <input type="text" name="q" class="form-control shadow-sm" placeholder="Type to find a card..." value="{{ query }}" autofocus>
        </form>

        {% for card in results %}
        <a href="/edit/{{ card.id }}" class="card-row">
            <div class="card-content">
                <div class="fw-bold mb-1" style="font-size: 1.1rem;">{{ card.front | truncate(60) }}</div>
                <div class="card-preview-text">{{ card.back | striptags | truncate(80) }}</div>
            </div>
            <div class="text-end">
                <span class="badge rounded-pill bg-primary">{{ (card.strength * 100) | int }}%</span>
            </div>
        </a>
        {% endfor %}

        {% if not results and query %}
        <div class="text-center mt-5 text-muted">No cards found matching "{{ query }}"</div>
        {% endif %}
    </div>

    <script>
        function toggleDarkMode() {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateBtn(isDark);
        }
        function updateBtn(isDark) { document.getElementById('themeBtn').innerHTML = isDark ? '☀️' : '🌙'; }
        (function() {
            if (localStorage.getItem('theme') === 'dark') { document.body.classList.add('dark-mode'); updateBtn(true); }
        })();
    </script>
</body>
</html>
