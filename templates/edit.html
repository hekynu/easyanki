<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f8f9fa; padding: 15px; }
        .edit-box { background: white; border-radius: 15px; padding: 20px; max-width: 600px; margin: auto; }
        .edit-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .live-preview { 
            background: #ffffff; padding: 20px; border-radius: 12px; 
            text-align: center; margin-bottom: 25px; border: 2px solid #e9ecef;
        }
        .live-preview img { max-width: 100%; border-radius: 8px; margin-top: 10px; }
        
        textarea { 
            width: 100%; border: 1px solid #ddd; border-radius: 8px; 
            padding: 10px; margin-bottom: 15px; font-family: monospace; 
            font-size: 0.85rem; background: #fcfcfc;
        }
        label { font-size: 0.8rem; color: #666; font-weight: bold; text-transform: uppercase; }
        .btn-remove-img { font-size: 0.7rem; padding: 2px 8px; border-color: #ffc107; color: #856404; }
    </style>
</head>
<body>
    <div class="edit-box shadow-sm">
        <div class="edit-header">
            <a href="/search" class="btn btn-sm btn-outline-secondary">← Back</a>
            <h5 class="m-0 text-muted">Card #{{ card.id }}</h5>
            <form action="/delete/{{ card.id }}" method="POST" onsubmit="return confirm('Delete this card permanently?');">
                <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
            </form>
        </div>

        <div class="live-preview">
            <div style="font-size: 1.8rem; font-weight: 800;">{{ card.front | safe }}</div>
            <hr style="width: 30%; margin: 15px auto;">
            <div style="font-size: 1.2rem;">{{ card.back | safe }}</div>
        </div>

        <form method="POST" enctype="multipart/form-data">
            <label>Front Text</label>
            <textarea name="front" id="frontInput" rows="2">{{ card.front }}</textarea>
            
            <div class="d-flex justify-content-between align-items-center">
                <label>Back Text</label>
                <button type="button" class="btn btn-sm btn-remove-img mb-1" onclick="stripImages()">Clear Image Code</button>
            </div>
            <textarea name="back" id="backInput" rows="4">{{ card.back }}</textarea>

            <label>Add/Replace Image</label>
            <input type="file" name="image" accept="image/*" class="form-control mb-4">
            
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-dark btn-lg shadow">Save Changes</button>
                <a href="/" class="btn btn-link text-muted">Exit to Home</a>
            </div>
        </form>
    </div>

    <script>
        function stripImages() {
            const backArea = document.getElementById('backInput');
            const frontArea = document.getElementById('frontInput');
            const imgRegex = /<img[^>]*>/g;
            
            if(confirm("Remove image code? You must click Save to finalize.")) {
                backArea.value = backArea.value.replace(imgRegex, '').trim();
                frontArea.value = frontArea.value.replace(imgRegex, '').trim();
            }
        }
    </script>
</body>
</html>
