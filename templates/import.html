<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; padding: 20px; font-family: sans-serif; }
        .import-wrapper { max-width: 600px; margin: 50px auto; background: white; padding: 35px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .upload-area { border: 2px dashed #ddd; border-radius: 15px; padding: 40px 20px; text-align: center; background: #fafafa; margin-bottom: 25px; cursor: pointer; }
        .upload-area:hover { border-color: #0d6efd; background: #f0f7ff; }
        .btn-import { padding: 18px; font-size: 1.2rem; font-weight: 800; border-radius: 12px; text-transform: uppercase; width: 100%; }
        .instructions { font-size: 0.9rem; color: #666; margin-top: 20px; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="import-wrapper">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="m-0">Import Deck</h2>
            <a href="/" class="btn btn-sm btn-outline-secondary">Back</a>
        </div>

        <p class="text-muted">Select your AnkiApp (.zip) export file below.</p>

        <form action="/run_import" method="POST" enctype="multipart/form-data">
            <div class="upload-area" onclick="document.getElementById('fileInput').click();">
                <input type="file" name="file" id="fileInput" style="display: none;" onchange="updateFileName(this)">
                <div id="upload-label">
                    <span style="font-size: 2rem;">📦</span><br>
                    <strong>Click to select ZIP file</strong>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-import shadow">Start Import</button>
        </form>

        <div class="instructions">
            <strong>Note:</strong> 
            <ul>
                <li>The importer will look for an .xml file inside the zip.</li>
                <li>It will automatically extract and link any images (blobs).</li>
                <li>Large decks (10,000+ cards) may take a few seconds to process.</li>
            </ul>
        </div>
    </div>

    <script>
        function updateFileName(input) {
            const label = document.getElementById('upload-label');
            if (input.files.length > 0) {
                label.innerHTML = `<strong>Selected:</strong><br>${input.files[0].name}`;
                label.style.color = "#0d6efd";
            }
        }
    </script>
</body>
</html>
